<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2486732565949048"
     crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelResize Widget</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; overflow: hidden; background: transparent; }
        .widget-card {
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            max-width: 300px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .widget-title { font-size: 14px; font-weight: 700; margin-bottom: 8px; color: #647FBC; }
        .widget-desc { font-size: 11px; color: #94a3b8; margin-bottom: 16px; }
        .widget-btn {
            background: #647FBC;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .widget-btn:hover { opacity: 0.9; }
        .widget-footer { font-size: 9px; margin-top: 12px; color: #475569; }
        .widget-footer a { color: #475569; text-decoration: none; }
    </style>
</head>
<body>
    <div class="widget-card">
        <div class="widget-title">Secure Image Resizer</div>
        <div class="widget-desc">Resize and compress images locally in your browser. 100% Private. No Uploads.</div>
        <a href="https://pixelresize.site" target="_blank" class="widget-btn">Open Tool</a>
        <div class="widget-footer">Powered by <a href="https://pixelresize.site" target="_blank">PixelResize.site</a></div>
    </div>
</body>
</html>
